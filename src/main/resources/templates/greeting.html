<!DOCTYPE HTML>
<html xmlns:th="https://www.thymeleaf.org">
<head> 
    <title>Getting Started: Handling Form Submission</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
</head>
<body>
	<h1>Formulario de Saludo</h1>
    <!-- El formulario apunta por POST a /greeting enviando el objeto ${greeting} -->
    <form action="#" th:action="@{/greeting}" th:object="${greeting}" method="post">
    	<p>Id: <input type="text" th:field="*{id}" /></p>
        <p>Mensaje: <input type="text" th:field="*{content}" /></p>
        <p><input type="submit" value="Enviar" /> <input type="reset" value="Borrar" /></p>
    </form>
</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Productos</title>
</head>
<body>
    <h1>Listado Completo de Productos</h1>
    <ul>
        <!-- Bucle FOR EACH iterando la variable ${lista} -->
        <li th:each="producto : ${lista}">
            Número: <span th:text="${producto.numero}"></span> | 
            Concepto: <span th:text="${producto.concepto}"></span> | 
            Importe: <span th:text="${producto.importe}"></span> €
        </li>
    </ul>
</body>
</html>

<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>FileDriver - Editor DAT</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; color: #333; margin: 0; padding: 30px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-left: 5px solid #2ecc71; }
        h1 { margin: 0; color: #2c3e50; font-size: 24px; }
        p.subtitle { margin: 5px 0 0 0; color: #7f8c8d; font-size: 14px; }
        .btn-download { background-color: #27ae60; color: white; text-decoration: none; padding: 12px 24px; border-radius: 6px; font-weight: bold; transition: all 0.3s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-download:hover { background-color: #2ecc71; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4); }
        .table-container { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #edf2f7; }
        th { background-color: #34495e; color: white; text-transform: uppercase; font-size: 13px; letter-spacing: 0.5px; }
        tr:last-child td { border-bottom: none; }
        tr:hover { background-color: #f8fafc; }
        input[type="text"] { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; transition: border-color 0.3s; font-family: inherit; }
        input[type="text"]:focus { outline: none; border-color: #3498db; box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2); }
        .btn-save { background-color: #f39c12; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; transition: all 0.3s; font-weight: 600; width: 100%; }
        .btn-save:hover { background-color: #e67e22; transform: translateY(-1px); }
        .badge { background: #e2e8f0; color: #475569; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>Editor de Datos FileDriver</h1>
            <p class="subtitle">Editando fichero binario (.DAT) en caliente. El esquema dinámico se ha calculado automáticamente.</p>
        </div>
        <a href="/filedriver/download" class="btn-download">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
            Descargar DAT en XML
        </a>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th width="50">ID</th>
                    <!-- Renderizamos las columnas dinámicas -->
                    <th th:each="campo : ${campos}" th:text="${campo}">Campo</th>
                    <th width="150">Acción</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="registro, iterStat : ${registros}">
                    <form action="/filedriver/saveRow" method="POST">
                        <input type="hidden" name="rowIndex" th:value="${iterStat.index}">
                        
                        <td><span class="badge" th:text="${iterStat.index}">0</span></td>
                        
                        <!-- Inputs dinámicos prellenados con el valor del DAT -->
                        <td th:each="campo : ${campos}">
                            <input type="text" th:name="${campo}" th:value="${registro.get(campo)}" autocomplete="off">
                        </td>
                        
                        <td>
                            <button type="submit" class="btn-save">Guardar Cambios</button>
                        </td>
                    </form>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>

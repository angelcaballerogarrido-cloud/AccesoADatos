<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>FileDriver - Subida XML</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; color: #333; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; max-width: 450px; width: 100%; border-top: 5px solid #3498db; }
        h1 { color: #2c3e50; margin-bottom: 15px; font-weight: 700; }
        p { color: #7f8c8d; margin-bottom: 30px; font-size: 15px; line-height: 1.5; }
        input[type="file"] { margin: 20px 0; width: 100%; padding: 10px; background: #f8f9fa; border: 2px dashed #bdc3c7; border-radius: 5px; }
        button { background-color: #3498db; color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; transition: all 0.3s ease; }
        button:hover { background-color: #2980b9; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4); }
        .error { background: #fee; color: #e74c3c; padding: 10px; border-radius: 5px; margin-top: 20px; font-size: 14px; border-left: 4px solid #e74c3c; text-align: left; }
    </style>
</head>
<body>
    <div class="card">
        <h1>FileDriver Web</h1>
        <p>Sube un archivo XML con estructura <strong>&lt;catalogo&gt;</strong> y <strong>&lt;item&gt;</strong>.<br/>Nuestro sistema calculará dinámicamente los anchos de columna y lo convertirá a un fichero binario DAT (Acceso Aleatorio) editable.</p>
        
        <form action="/filedriver/upload" method="POST" enctype="multipart/form-data">
            <input type="file" name="file" accept=".xml" required>
            <button type="submit">Procesar XML a DAT</button>
        </form>
        
        <div th:if="${error}" class="error" th:text="${error}"></div>
    </div>
</body>
</html>
